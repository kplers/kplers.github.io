<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매직: 더 개더링 - 대화형 이야기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Roboto+Mono&family=Gowun+Batang&display=swap"
        rel="stylesheet">
    <!-- Chosen Palette: Calm Harmony (Stone, Teal, Amber) -->
    <!-- Application Structure Plan: A single-page application with a main story view. User choices are presented as buttons that dynamically update the view via JavaScript, creating a "choose your own adventure" flow. A slide-in side panel serves as an on-demand lore database, triggered by clicking highlighted terms in the text to provide context without interrupting the narrative. Special sections like the "Anathalmanac" and "Flight Plan" are uniquely styled to match their in-story tone. This structure was chosen to directly translate the source's branching narrative into an intuitive interactive experience while using the side panel to manage the dense lore in a user-friendly way. -->
    <!-- Visualization & Content Choices: 
        - Narrative Branching: Report Info -> Story choices. Goal -> Guide user. Method -> HTML text + JS-powered buttons. Interaction -> Click button to load next story block. Justification -> Core mechanic of the source material. Library/Method -> Vanilla JS.
        - Lore/Terminology: Report Info -> Proper nouns (Pinnacle, Drix, etc.). Goal -> Provide context. Method -> Highlighted spans, side panel. Interaction -> Click term to open panel. Justification -> Avoids information overload, deepens engagement. Library/Method -> Vanilla JS, Tailwind CSS.
        - Sigma's Reach Data: Report Info -> Population vs. heat signature vs. actual life. Goal -> Compare conflicting data points. Method -> Bar Chart. Interaction -> Chart appears when this story section is active. Justification -> Visualizing the discrepancy is more impactful than reading it in prose. Library/Method -> Chart.js on a Canvas element.
        - Anathalmanac/Flight Plan: Report Info -> Structured lists/logs. Goal -> Set a specific tone. Method -> Styled HTML with Tailwind, monospaced fonts. Interaction -> Static display. Justification -> Maintains the source's stylistic intent. Library/Method -> HTML/Tailwind.
        - Notation Dialogs: Report Info -> "Mem" and "Tezzeret" notations. Goal -> Replicate source's specific interaction. Method -> Modal dialogs. Interaction -> Click special buttons to show/hide dialogs. Justification -> Faithful reproduction of the source's interactive design. Library/Method -> HTML <dialog> element, Vanilla JS.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f5f4;
            /* stone-100 */
        }

        .font-mono {
            font-family: 'Roboto Mono', monospace;
        }

        .font-serif {
            font-family: 'Gowun Batang', serif;
        }

        .content-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .choice-button {
            transition: all 0.2s ease-in-out;
        }

        .choice-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        .lore-term {
            cursor: pointer;
            color: #0d9488;
            /* teal-600 */
            font-weight: bold;
            border-bottom: 1px dotted #0d9488;
            transition: color 0.2s;
        }

        .lore-term:hover {
            color: #f59e0b;
            /* amber-500 */
        }

        #lore-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }

        #lore-panel.is-open {
            transform: translateX(0);
        }

        .art-credit {
            font-style: italic;
            color: #78716c;
            /* stone-500 */
            text-align: right;
            font-size: 0.875rem;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
        }

        .anathalmanac-title {
            font-weight: bold;
            color: #dc2626;
            /* red-600 */
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .flight-plan {
            background-color: #1c1917;
            /* stone-900 */
            color: #a7f3d0;
            /* emerald-200 */
            border-radius: 0.5rem;
            padding: 1.5rem;
            border: 1px solid #44403c;
            /* stone-700 */
        }

        .flight-plan .error {
            color: #ef4444;
            /* red-500 */
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }

        dialog {
            border: none;
            border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            padding: 0;
            max-width: 52rem;
            width: 90%;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }

        .special-button {
            background: #005e85;
            border: 4px solid #dff6ff;
            color: #ffffff;
            padding: 5px 18px;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .tezz-button {
            background: #404040;
            border: 4px solid #dff6ff;
            color: #ffffff;
            font-family: 'Roboto Mono', monospace;
            padding: 5px 18px;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body class="text-stone-800">

    <main id="app-container" class="relative min-h-screen container mx-auto p-4 sm:p-6 lg:p-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-stone-900">제1막</h1>
        </header>
        <div id="story-content" class="bg-white/50 backdrop-blur-sm p-6 sm:p-8 rounded-lg shadow-lg">
        </div>
    </main>

    <div id="lore-panel"
        class="fixed top-0 right-0 h-full w-full max-w-sm bg-stone-800 text-stone-200 shadow-2xl p-6 overflow-y-auto z-50">
        <div class="flex justify-between items-center mb-4">
            <h2 id="lore-title" class="text-2xl font-bold text-amber-400">용어 해설</h2>
            <button id="close-lore-btn" class="text-stone-400 hover:text-white transition-colors">&times;</button>
        </div>
        <div id="lore-body" class="space-y-4"></div>
    </div>

    <dialog id="notation-dialog" class="p-0">
        <div id="dialog-content" class="p-6"></div>
    </dialog>

    <script>
        const storyData = {
            'Revision0': {
                title: '수정 0',
                content: `
                    <p class="mb-4">나는 태양이 폭발해 나를 산산조각 낼 때까지 진흙 속에 누워 있다.</p>
                    <p class="mb-6">실패한 시간선의 끝.</p>`,
                choices: [
                    { text: '다시 시작하기', target: 'Revision1' }
                ]
            },
            'Revision1': {
                title: '수정 1',
                content: `
                    <p class="mb-4">내가 '너'를 창조한다.</p>
                    <p class="italic text-stone-600 mb-2">'너'는 누구지?</p>
                    <p class="mb-4">너는 내가 '나'라고 상상하는 사람이다.</p>
                    <p class="italic text-stone-600 mb-2">그건 아무 의미도 없잖아.</p>
                    <p class="mb-4">너는 이미 한 명의 사람이었다. 내가 너를 창조하지 않았다. 하지만 이제 너는 내가 '나'라고 상상하는 사람이 되었다.</p>
                    <p class="italic text-stone-600 mb-2">너는 존재하지 않는 거야?</p>
                    <p class="mb-4">나는 존재한다. 하지만 나는 '나'가 아니다. 적어도 네가 나를 상상하기 전까지는.</p>
                    <p class="mb-4">자. 내가 도와주지. 나를 아주 복잡한 조차장의 분기기라고 상상해 봐라. 그곳에서는 기차들이 나뉘고 합쳐지고, 때로는 구덩이로 곤두박질치기도 한다.</p>
                    <p class="mb-4">모든 선로는 결국 같은 곳으로 이어진다. 구덩이조차도 그곳으로 향한다. 하지만 그곳에 도달하기까지는 여러 길을 택할 수 있다.</p>
                    <p class="mb-4">네가 나를 조작할 수 있도록, 나를 이런 식으로 생각해 주었으면 한다.</p>
                    <p class="mb-4">네가 선택을 내릴 수 있도록.</p>
                    <p class="mb-4">진실은, 나는 길을 잃었다는 것이다. 나는 그 조차장에서 아주 멀리 떨어져 있다. 그리고 나는 다시 일터로 돌아가야 한다.</p>
                    <p class="mb-6">부디, 누군가 나를 찾도록 선택해 줄 수 있겠나?</p>`,
                choices: [
                    { text: '예', target: 'Revision2' },
                    { text: '아니오', target: 'Revision0' }
                ]
            },
            'Revision2': {
                title: '수정 2 (소테라)',
                content: `
                    <p class="text-2xl font-bold mb-4">태양이 폭발했던 세기였다.</p>
                    <img src="https://media.wizards.com/2025/images/daily/9agafvIDOM.webp" alt="Sothera system art" class="w-full max-w-lg mx-auto my-6 rounded-lg shadow-lg">
                    <p class="art-credit">아트워크: Dominik Mayer</p>
                    <p class="mb-4">그 태양의 이름은 소테라였다. 그녀는 할머니였다.</p>
                    <p class="mb-4">수십억 년 전, 소테라는 다섯 자녀를 낳았다. 그녀의 화롯가에서 몸을 녹일 다섯 개의 세계. 오늘날 그들은 수수르 세쿤디(전 아누키), 아다지아(전 아다와), <span class="lore-term" data-lore="kavaron">카바론</span>, 에벤도, 그리고 거인 우트로스다.</p>
                    <p class="mb-4 italic text-stone-600">(다른 자녀들도 있다. 대부분 이상한 자들이지만. 하지만 지금은 그들에게서 너를 멀리 떨어뜨려 놓겠다.)</p>
                    <p class="mb-4">그로부터 *그렇게까지* 수십억 년이 지나지 않아, <span class="lore-term" data-lore="kavaron">카바론</span>은 손주들을 낳았다. 바로 <span class="lore-term" data-lore="kav">카브족</span>이다.</p>
                    <p class="mb-4">그리고, 여느 아이들이 그렇듯, <span class="lore-term" data-lore="kav">카브족</span>은 어미의 마음을 아프게 했다.</p>
                    <p class="mb-4">그들은 <span class="lore-term" data-lore="kavaron">카바론</span>을 너무 깊이 파고들어 갈가리 찢어버렸다. 자신들의 고향 세계에 농양을 터뜨린 것이다. 대륙 전체가 솟아올랐다가 그 구멍으로 주저앉거나, 아예 내려오지 못했다. <span class="lore-term" data-lore="kavaron">카바론</span>은 두 동강 났다. 오늘날 사람들은 한쪽을 '존재하는 카바론'이라 부르고 다른 쪽을 '이전의 카바론'이라 부른다. 그들의 어리석음이 낳은 참상의 핏물은 그 주위에 고리를 만들었고, 오늘날까지도 그들 위로 떨어진다. 그들은 그것을 두라누, 모르드레인 고리라고 부른다. 살인이 남긴 돌비이기 때문이다.</p>
                    <p class="mb-4">그렇게, <span class="lore-term" data-lore="kav">카브족</span>은 그들의 어미를 죽였다. 하지만 그것은 소테라 자신에게 다가오는 죽음에 비하면 작은 죽음이었다.</p>
                    <p class="mb-4">소테라는 너무 밝아졌다. 소테라는 너무 커졌다. 소테라의 빛은 이상하게 변했다.</p>
                    <p class="mb-4">소테라는 정글로 잘못 들어섰다. 성간 에테르의 구름 속으로. 그리고 그녀는 그 정글을 게걸스럽게 먹어치우고 있었다. 죽음에 이를 때까지.</p>
                    <p class="mb-4">소테라의 어느 세계에서든 밤하늘을 올려다보면, 우주 가스의 야만적인 수채화를 보게 될 것이다. 성운이 소테라 자체로 몰려들어 별을 둘러싸고, <span class="lore-term" data-lore="kav">카브족</span>이 '정원'이라 부르는 짙은 미스터리의 구름을 형성했다. 그들이 자신들의 세계를 찢어발긴 것도 무리는 아니다! 그들은 별의 피로 가득한 하늘 아래서 진화했다. 그들은 그 냄새를 맡았던 것이다.</p>
                    <p class="mb-4">200년도 채 되지 않아, 소테라는 초신성이 될 터였다. 그 폭발은 모든 세계의 대기를 벗겨내고 정원을 우주 공간으로 날려버릴 것이다.</p>
                    <p class="mb-4">이제 당신은 소테라가 저주받았다고 생각하기 시작할지도 모른다. 어쩌면 이곳에 거대한 악이 도사리고 있을지도. 어쩌면 소테라는 죽어서 우주를 그 비밀로부터 구원할 운명이었을지도 모른다.</p>
                    <p class="mb-4">하지만 임박한 초신성은 거대한 재앙이다. 그리고 기념비, 특히 이상한 기념비는 항상 숭배자들을 끌어들이는 법이다.</p>
                    <p class="mb-6">그래서, <span class="lore-term" data-lore="pinnacle">피너클</span>이 소테라에 왔다.</p>`,
                choices: [
                    { text: '피너클이 뭔가요?', target: 'Pinnacle' },
                    { text: '이제 진짜 이야기를 시작하면 안 될까요?', target: 'Revision4' }
                ]
            },
            'Pinnacle': {
                title: '피너클이 뭔가요?',
                content: `
                    <p class="mb-4"><span class="lore-term" data-lore="pinnacle">피너클</span>은 돕기 위해 여기에 있다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="pinnacle">피너클</span> 없이는 항성 간 여행도 없고, <span class="lore-term" data-lore="drix">드릭스</span> 없이는 <span class="lore-term" data-lore="pinnacle">피너클</span>도 없다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="drix">드릭스</span>를 아는가?</p>
                    <p class="italic text-stone-600 mb-4">모를 거라 생각했다. 아무도 모르니까.</p>
                    <p class="mb-4">그리 오래되지 않은 과거에—적어도 내가 세는 시간으로는—<span class="lore-term" data-lore="drix">드릭스</span>는 영원의 기둥의 비밀을 <span class="lore-term" data-lore="pinnacle">피너클</span>에게 주었다. 기둥은 별과 별 사이를 여행하기 위해 오르는 것이다.</p>
                    <img src="https://media.wizards.com/2025/images/daily/nvp9bjZHex.webp" alt="Eternity Column art" class="w-full max-w-lg mx-auto my-6 rounded-lg shadow-lg">
                    <p class="art-credit">아트워크: Rovina Cai</p>
                    <p class="mb-4">그 대가로, (기둥이나 함선 없이도 별들 사이를 <span class="lore-term" data-lore="weftwalk">씨실처럼 거닐 수 있는</span>) <span class="lore-term" data-lore="drix">드릭스</span>는 <span class="lore-term" data-lore="pinnacle">피너클</span>로부터 약속을 받았다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="pinnacle">피너클</span>의 손이 닿는 곳에 있는 별이 죽음을 맞이할 때마다, <span class="lore-term" data-lore="pinnacle">피너클</span>이 방문하기로. 그들은 영원의 기둥을 세우고 구할 수 있는 것을 구하기로. 그들은 <span class="lore-term" data-lore="drix">드릭스</span>가 죽어가는 항성계를 수색하는 것을 돕기로.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="drix">드릭스</span>가 무엇을 찾는지는 말하기 어렵다. 어떤 사회학자들은 그들이 무언가를 가져간다고 주장한다. 다른 이들은 무언가를 깊이 묻는다고 말한다.</p>
                    <p class="mb-4 italic text-stone-600">"젊은이들이 미래를 지배할지 모르나, 미래를 위해, 늙은이들은 과거를 지켜야 한다."</p>
                    <hr class="my-6">
                    <p class="mb-4"><span class="lore-term" data-lore="pinnacle">피너클</span>이 소테라를 성간 비행에 개방한 후, 희망을 품은 자들이 몰려들었다.</p>
                    <p class="mb-4">그들은 돈을 바란 것이 아니었다. <span class="lore-term" data-lore="pinnacle">피너클</span>은 돈을 사용하지 않는다. <span class="lore-term" data-lore="pinnacle">피너클</span>은 <span class="lore-term" data-lore="drix">드릭스</span>와의 조약으로 만들어졌고, 마음에 들지 않는 약속은 언제든 <span class="lore-term" data-lore="weftwalk">씨실처럼 걸어</span> 떠나버릴 수 있는 <span class="lore-term" data-lore="drix">드릭스</span>는 속박, 강요, 위계, 또는 제약에 기반한 어떤 경제도 인정하지 않기 때문이다.</p>
                    <p class="mb-4">하지만 <span class="lore-term" data-lore="drix">드릭스</span>는 여행자의 권리와 주인의 의무를 매우 중요하게 여긴다. 그들은 이 의무를 <span class="lore-term" data-lore="mallowmass">맬로우매스</span>라고 부른다. 그 상징은 보라색 꽃이다.</p>
                    <p class="mb-4">소테라에 온 희망을 품은 자들은 <span class="lore-term" data-lore="mallow">맬로우</span>를 찾고 있었다. 선한 일을 함으로써 얻는 평판을. 화폐가 없는 문명에서는, 오직 그 평판만이 중요하다.</p>
                    <p class="mb-4">그리고 파멸을 앞둔 소테라에서는, <span class="lore-term" data-lore="kav">카브족</span>의 대피를 돕거나, 임박한 초신성을 연구하거나, 불길에 사라질지 모를 지식을 찾는 등, 고귀한 명성을 얻을 만한 일이 아직 남아 있었다. 천궁의 우주거물들부터 <span class="lore-term" data-lore="illvoi">일보이</span> 사이클로닉스의 고위 간부들, 프라임 포인트 수도원의 속삭이는 회랑에 이르기까지, 권력의 전당에서 주목받고, 신뢰받고, 기회를 얻게 해주는 그런 종류의 <span class="lore-term" data-lore="mallow">맬로우</span>를 얻을 수 있는 일 말이다.</p>
                    <p class="mb-4">그리하여, 모든 상식을 거스르고 오직 최상의 상식(호스피스의 상식, 불타는 도서관에서 책을 필사하는 상식)에 따라, 소테라는 마지막 몇 세기 동안 채워지고 번성하기 시작했다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="illvoi">일보이</span>는 우트로스의 심연을 탐사하러 왔다. (나중에 기억하겠지만, <span class="lore-term" data-lore="mirri">미리</span>는 우트로스 근처의 부두에서 사라졌다.) <span class="lore-term" data-lore="kav">카브족</span>은 이미 이곳에 있었고 떠나야 했다. 소테라 가장자리의 웜월에는 웜들이 있었고, 정원의 우주 에테르에는 이상한 존재들이 있었다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="pinnacle">피너클</span>의 첫 조사에서는 에벤도의 대기에서 <span class="lore-term" data-lore="eumidian">유미디안</span> 테라심바이오시스의 미량 가스까지 발견했다. 영겁의 세월 전, 한 <span class="lore-term" data-lore="eumidian">유미디안</span> 종자선이 이곳, 얼음 아래 짓눌린 정글, 이 얼어붙은 낙원에 새끼를 심었다. <span class="lore-term" data-lore="eumidian">유미디안</span>들은 그곳을 바꾸고, 그곳에 맞게 자신들을 바꾸기 시작했다. <span class="lore-term" data-lore="eumidian">유미디안</span>은 한번 집을 정하면 떠나지 않는다. 그들은 에벤도가 불탈 때까지 가꾸기 위해 일할 것이다. 그리고 어쩌면 그 후 어두운 잿더미 위로 다시 기어 나와 재시도할 <span class="lore-term" data-lore="eumidian">유미디안</span>들이 있을지도 모른다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="eumidian">유미디안</span>을 아는가? 분명 알 것이다. 그들은 혼돈의 벽과 고요의 벽 사이에서 가장 기본적인 생명체 형태로 여겨지곤 한다. 순전히 수적으로 평범함을 정의하는 자들. 빠르고, 다재다능하고, 호기심 많고, 다양한 형태로 태어나고, 배우기를 열망하고, 새로운 세계를 만나기를 갈망하며, 그에 맞춰 변화하기를 갈망한다.</p>
                    <p class="mb-4">마지막으로 <span class="lore-term" data-lore="human">인간</span>이 왔다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="human">인간</span>을 아는가?</p>
                    <p class="mb-4">그들은 특이한 전문화의 사례다. 긴 다리, 흰 눈, 그들은 달리고 던지는 것을 좋아한다. 무언가가 그들을 모두 죽였다. 거의 멸종 직전까지 몰아붙였고, 그들은 생존자들로부터 다시 번성했다. 그들은 이제 너무나 닮아서, 역사상의 어떤 시기에는 단일한 인지 유형을 표준으로 정하고 나머지는 모두 이질적인 것으로 취급하기도 했다.</p>
                    <p class="mb-4">변화하는 우주에 대항할 수 있는 변종이나 분기군이 없기 때문에, <span class="lore-term" data-lore="human">인간</span>은 대신 문화를 발전시켰다. 세대에서 세대로 전해지는 지식의 웅덩이를.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="human">인간</span>, 당신이 알다시피, 그들은 의무적인 모방자다. 유아기 때, 그들이 할 줄 아는 유일한 것은 *모방*이다. 모방하지 않으면 생존할 수 없다. 근친 교배된 <span class="lore-term" data-lore="human">인간</span>은 유전자로부터 적응적 다양성을 얻을 수 없다.</p>
                    <p class="mb-4">일부 사회학자들, 특히 <span class="lore-term" data-lore="kav">카브족</span>은 이것을 매혹적으로 여긴다. <span class="lore-term" data-lore="eumidian">유미디안</span>을 보고 "너는 선봉대 변종이구나, 너는 부엽토 변종이구나"라고 말할 수 있는 것처럼, <span class="lore-term" data-lore="human">인간</span>을 보거나 냄새 맡는 것만으로는 많은 것을 알 수 없다. 그 <span class="lore-term" data-lore="human">인간</span>이 어떤 *문화*를 모방하도록 배웠는지를 알아야 한다. 그리고 그 문화가 그들에게 모든 차이를 만든다. 그것이 그들이 무엇을 선택하고, 무엇을 믿고, 심지어 무엇을 인식하는지를 결정한다.</p>
                    <p class="mb-4">이것이 <span class="lore-term" data-lore="human">인간</span>을 위대한 신앙의 훌륭한 신병으로 만드는 이유다.</p>
                    <p class="mb-4">그 신앙 중 두 개가 소테라를 두고 전쟁을 벌였다.</p>
                    <p class="mb-4">먼저 <span class="lore-term" data-lore="monoist">모노이스트</span>들이 왔다. *끝없고 최종적인 정리*의 숭배자들이자 *추락의 기록*의 전도사들. 그들 모두가 <span class="lore-term" data-lore="human">인간</span>은 아니었다. <span class="lore-term" data-lore="monoist">모노이스트</span>들은 그 이름에도 불구하고 단일한 진리를 숭배하는 국제적인 집단이다. 그들은 소테라의 가장 안쪽 세계인 아누키에 정착했고, 추락하는 자가 그들을 위해 그곳을 준비해 두었음을 발견했다. 미궁과 신성한 조수로 가득 채워둔 것을. 오, 그들은 그 조수를 증폭시킬 것이었다. 마치 심연에서 솟아나는 노래처럼!</p>
                    <img src="https://media.wizards.com/2025/images/daily/Ki9imoLffa.webp" alt="Monoist art" class="w-full max-w-lg mx-auto my-6 rounded-lg shadow-lg">
                    <p class="art-credit">아트워크: Alix Branwyn</p>
                    <p class="mb-4">그래서 그들은 그곳을 수수르 세쿤디라고 이름 지었다. 그들의 고향이자 무덤이며 속삭이는 대성당인 수수르를 찬양하여.</p>
                    <p class="mb-4">그리고 그들은 자신들의 도구와 송영을 저 위 부풀어 오른 할머니 별에게 돌리고, 다른 누구도 감히 입 밖에 내지 못했던 한 가지 질문을 던졌다.</p>

                    <p class="mb-4">"하지만 비행 계획에는 <span class="lore-term" data-lore="mirri">미리</span>를 찾는다고 했잖아."</p>
                    <p class="mb-4">"오. 그래. 뭐, 그 부분은 사실이야."</p>
                    <p class="mb-4"><span class="lore-term" data-lore="sami">사미</span>가 하는 모든 일은 진정으로 <span class="lore-term" data-lore="mirri">미리</span>를 찾는 것에 관한 것이다. 이것이 <span class="lore-term" data-lore="sami">사미</span>의 선원들이 하나둘씩 모두 그만둔 이유다. 실종된 고양이를 찾기 위해 평생을 바치는 것은 범죄 사업을 운영하는 데 나쁜 방법임이 드러났다.</p>
                    <p class="mb-4">"우리는 <em>항상</em> <span class="lore-term" data-lore="mirri">미리</span>를 찾고 있잖아. 주 엔진 정지 대기."</p>
                    <p class="mb-4">주 엔진 정지(meco)는 핵융합 드라이브를 끄는 것이다. 핵융합 드라이브를 <em>켜는</em> 것(mest)보다 쉬울 것 같지만, 만약 켜는 데 실패하면 아무 일도 일어나지 않는다. 만약 끄는 데 실패하면, 엉덩이에서 핵융합 폭발이 굴러다니는데 멈출 수가 없다.</p>
                    <p class="mb-4">"비행 계획 없이 비행하는 건 꽤 위험해. 특히 전쟁 지역에서는," <span class="lore-term" data-lore="tannuk">타누크</span>가 말한다.</p>
                    <p class="mb-4">"우리는 전쟁 지역에서 한참 벗어나 있어."</p>
                    <p class="mb-4">"그래도. 선스타가 검사를 위해 우리 배에 오를지도 몰라. 그냥 돌아서 돌아가는 게 어때."</p>
                    <p class="mb-4"><span class="lore-term" data-lore="sami">사미</span>는 <span class="lore-term" data-lore="tannuk">타누크</span>의 농담에 감사한다. <span class="lore-term" data-lore="sami">사미</span>는 자신이 잘하는 것에 집중하면 갑자기 못하게 될 것이라고 생각한다. "연소 중간에 추진제가 바닥날 거야." 과장된 머리 흔들기, 모든 <span class="lore-term" data-lore="sami">사미</span>의 몸짓처럼 마임이 가득하며, 종족 간의 명확성을 위해 훈련되었다. "탄, 탄, 아직도 멤나브 조종사처럼 생각하는구나. <span class="lore-term" data-lore="kavaron">카바론</span> 근처에서 연료가 떨어지면, 집으로 날아갈 만큼의 동력을 쏴줄 거야. 하지만 우리는 더 이상 바위를 잡는 게 아니라고." 그리고 너는 집에 있는 게 아니야: 하지만 <span class="lore-term" data-lore="sami">사미</span>는 그 말을 할 필요가 없다.</p>
                    <p class="mb-4">"카바론 부스트 레이저가 그립긴 하네," 탄이 말한다. "다시 보게 되면 기쁠 거야. 멀리서. 게다가, 만약 우리가 돌아가고 싶다면, 새로운 비행 계획을 제출해야 하잖아."</p>
                    <p class="mb-4">"그렇지, 그렇지."</p>
                    <p class="mb-4">"그리고 그들이 승인할 때쯤이면, 우리는 이미 우리가 가지 않는 척하는 곳에 도착해 있을 거야. 주 엔진 정지 5초 전..."</p>
                    <p class="mb-4">"그리고... 3초... 그리고... 지금."</p>
                    <p class="mb-4">비행 컴퓨터가 주 엔진을 멈춘다.</p>
                    <p class="mb-4">갑작스러운 침묵. <span class="lore-term" data-lore="kav">카브</span>와 <span class="lore-term" data-lore="human">인간</span>은 좌석에서 앞으로 떠오른다. 추력 없이, 그들은, 싸구려 모험 소설에서 항상 말하듯, 부유 상태에 있다: 초속 수십 킬로미터로 허공을 향해 곤두박질치고 있다.</p>
                    <p class="mb-4">마지막 주 엔진 연소 <em>전에도</em> 그들은 허공을 향해 곤두박질치고 있었다.</p>
                    <p class="mb-4">이제 그들은 행성을 향해 곤두박질치고 있다.</p>
                    <p class="mb-4">"깔끔한 주 엔진 정지," <span class="lore-term" data-lore="tannuk">타누크</span>가 말한다. "진입 인터페이스 기동 준비."</p>
                    <p class="mb-4">"준비해. 난 문제 없는지 확인해 볼게."</p>
                    <p class="mb-4">"알았어. 진입 인터페이스 준비 중."</p>
                    <p class="mb-4"><span class="lore-term" data-lore="kav">카브</span>에게는, 말하는 것이 행동하는 것의 그다지 중요한 부분이 아니지만, <span class="lore-term" data-lore="human">인간</span>에게는 그렇다. 그리고 탄은 훌륭한 부조종사다. 그래서 탄은 항상 자신이 무엇을 하는지 <span class="lore-term" data-lore="sami">사미</span>가 들을 수 있도록 말한다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="sami">사미</span>는 손춤을 춘다: 두툼한 스위치 보호대를 위로 젖히고, 스위치를 아래로 누르고, 보호대를 다시 제자리에 끼우고, 딸깍 소리가 날 때까지 손잡이를 돌리고, 버튼을 끝까지 누르고, 레버를 당겨 장력을 풀고 잡는다. 모든 것이 물리적이다. 터치스크린도, 홀로그램도, 콜로이드 인터페이스도 없다. 오직 <span class="lore-term" data-lore="sami">사미</span>가 그것들을 구할 수 없기 때문이다. (콜로이드는 멋질 것이다. 살아있는 구슬 같은 화면에 손을 담가 쥘 수 있는.) <span class="lore-term" data-lore="sami">사미</span>는 만져서 작동시키고, 무언가를 일으키고, 함선이 변하고 노래하게 만드는 모든 것을 사랑한다.</p>
                    <p class="mb-4">지금 당장, 함선은 아주 빠르게 변해야 한다. 그렇지 않으면 행성에 부딪혀 폭발할 것이다.</p>
                    <p class="mb-4">그들의 비행 계획—최근 소테라에 본부를 둔 <span class="lore-term" data-lore="pinnacle">피너클</span>의 무한 지침에 의해 거부된—은 폭풍 거인 우트로스에서 안쪽으로, <span class="lore-term" data-lore="kav">카브</span> 고향 세계 <span class="lore-term" data-lore="kavaron">카바론</span>으로 향하는 빠른 순항이다. 그 과정에서, 그들은 왜소 행성 시그마와 사람이 살지 않는 식민지 시그마의 손길을 지나갈 것이다. 그곳은 목사이트 광산이 될 예정이었지만, 아무도 일을 시작하러 오지 않았다: 결국, 태양이 폭발할 참이었으니까. <span class="lore-term" data-lore="sami">사미</span>는 이 모든 시도가 포틀래치 사기였다고 의심한다—자신의 <span class="lore-term" data-lore="mallow">맬로우</span>를 높이기 위해 다른 사람들에게 기회를 만들기 위해 자원을 눈에 띄게 소비하는 것.</p>
                    <p class="mb-4">비행 계획에서, <span class="lore-term" data-lore="sami">사미</span>는 함선이 망가지기 시작하면 피난할 수 있는 장소로 시그마의 손길을 언급했다.</p>
                    <p class="mb-4">하지만 함선은 <em>이미</em> 망가지고 있다. <span class="lore-term" data-lore="seriema">세리마</span>호('사미 여기 있네'의 애너그램, 사랑스러운 이름, 끔찍한 새, 멋진 함선)는 선원이 부족할 뿐만 아니라, 중성자 부식으로 썩어가고 금속 피로로 부서지기 쉽다. 핵분열 원자로는 수명이 다했다. 핵융합 엔진은 하우징을 뚫고 부식되어 구슬처럼 공급 장치 위에서 튕겨 나갈 지경이다. 분해와 재조립, 용골부터 시작하는 기계적 마사지가 필요하지만, 아무도 <span class="lore-term" data-lore="sami">사미</span>에게 그런 종류의 일을 해줄 호의를 베풀지 않을 것이다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="sami">사미</span>는 모든 호의를 <span class="lore-term" data-lore="mirri">미리</span>를 찾느라 날려버렸다.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="sami">사미</span>는 연료도, 시간도, 선택지도 바닥나고 있지만, 지금은 그것에 대해 생각하지 않을 것이다. 왜냐하면 그들은 자신이 내린 단 하나의 돌이킬 수 없는 선택에 갇혀 있기 때문이다: 무슨 일이 있어도 <span class="lore-term" data-lore="mirri">미리</span>를 찾겠다는 선택.</p>
                    <p class="mb-4">"그녀를 쫓는 건 고결한 일이야," 마지막으로 떠난 아라타가 말했다. "하지만 <span class="lore-term" data-lore="sami">사미</span>... 그녀는 그냥 고양이잖아."</p>
                    <p class="mb-4">어떤 것도 <em>그냥</em> 어떤 것이 아니다.</p>
                    <p class="mb-4">"<span class="lore-term" data-lore="sami">사미</span>, 네가 잃어버린 작은 아메바 접시를 찾기 위해 평생과 호의를 다 쓸 거야?"</p>
                    <p class="mb-4">만약 그것이 <span class="lore-term" data-lore="sami">사미</span>의 접시였다면, 만약 그 아메바들이 전적으로 <span class="lore-term" data-lore="sami">사미</span>의 보살핌에 맡겨졌다면, 만약 <span class="lore-term" data-lore="sami">사미</span>가 그들의 운명을 완전히 통제하고 있었다면—그리고 그들을 잃어버렸다면?</p>
                    <p class="mb-4">그렇다. 그렇다. 어떤 것도 버려져서는 안 된다. <em>어떤 것도.</em></p>
                    <p class="mb-4">미리도. 그리고 시그마의 손길도.</p>
                    <p class="mb-4">그래서, 버려지는 것을 막기 위해, 그들은 버려진 식민지에 착륙하여 가질 수 있는 모든 것을 가질 것이다.</p>
                    <hr class="my-6">
                    <img src="https://media.wizards.com/2025/images/daily/EX89Hjgu4E.webp" alt="Seriema ship art" class="w-full max-w-lg mx-auto my-6 rounded-lg shadow-lg">
                    <p class="art-credit">아트워크: Sergey Glushakov</p>
                    <p class="mb-4">허공 밖에서, <span class="lore-term" data-lore="seriema">세리마</span>호는 근육질의, 칼날 같은 횃불이다. 은색 원반 같은 비행 갑판과 원자로 하우징 주위를 감싼 자기 노즐과 화물 공간의 양끝이 달린 게 집게발 같다. 세 개의 영광스러운 방열 날개는 횃불이 발사될 때 밝은 주황색으로 빛난다.</p>
                    <p class="mb-4">하지만 그들이 죽은 일몰에서 내려와, 시그마의 상층 대기를 뚫고 제동을 걸어 행성 간의 분주함을 떨쳐낼 때, 함선은 변신한다.</p>
                    <p class="mb-4">먼저 <span class="lore-term" data-lore="seriema">세리마</span>호는 날개를 접는다. 그런 다음 오로라의 돛을 펼친다—핵융합 드라이브와 같은 자석으로 생성된 보라색 플라스마 원반으로, 열 차폐막과 브레이크 역할을 한다.</p>
                    <p class="mb-4">상황은 빠르고 매우 추운 상태에서 빠르고 매우 뜨거운 상태로 변한다.</p>
                    <p class="mb-4">탄은 핵융합 엔진을 공력 제동 장치로 사용하는 것을 싫어한다. "안전벨트 풀어야겠어," 그가 고집을 부리고, <span class="lore-term" data-lore="sami">사미</span>의 미적지근한 반대에도 불구하고, 그는 나쁜 진동을 느끼기 위해 배를 격벽에 댄다.</p>
                    <p class="mb-4">그가 아직 이러고 있을 때, <span class="lore-term" data-lore="sami">사미</span>의 문제 탐색기가 경보를 울린다.</p>
                    <p class="mb-4">"어-오," <span class="lore-term" data-lore="sami">사미</span>가 말한다. "창백한 별이 잡혔어."</p>
                    <p class="mb-4"><span class="lore-term" data-lore="seriema">세리마</span>호의 관측 망원경이 빛에 고정된다. 그것은 청자색 별로, 시그마의 옅은 대기를 통해 아침 신기루처럼 반짝인다. 그것은 <em>순수한</em> 보라색이어야 한다: 핵융합 불꽃. 하지만 이 빛은 성난 녹색으로 줄무늬가 져 있다. 그것은 애프터버너로 핵융합 토치에 물을 쏟아부은 것이다. 그것은 깨끗한 빛이 아니다. 순수한 빛이 아니다. 그것은 군함이다.</p>
                    <p class="mb-4">창백한 별. 자유 중대의 순찰선, 아다지아에 자리를 잡고 소테라 자체와 전쟁을 벌이고 있는 선스타 장기주의자들의 순찰선이다.</p>
                    <p class="mb-4">결국 그들은 <em>죽은</em> 일몰에서 내려오고 있다.</p>
                    <p class="mb-4">탄은 벽에 기대어 흐느적거린다. <span class="lore-term" data-lore="kav">카브족</span>은 위험이 닥치기 직전에 긴장을 푸는 경향이 있다. "우리를 쫓아오는 건가?"</p>
                    <p class="mb-4">만약 창백한 별이 그들을 쫓아온다면 매우 나쁠 것이다. 그것은 <span class="lore-term" data-lore="seriema">세리마</span>호를 능가할 수 있는 희망의 빛 전투기 편대를 싣고 있다. 그 눈시오 레이저는 함선의 엔진을 잘라내어 그들을 나쁜 소원처럼 떨어지게 할 수 있다. 그리고 만약 그 함선을 지휘하는 선스타 기사가 그들을 도둑이라고 판단한다면—</p>
                    <p class="mb-4">하지만 아니다. 창백한 별은 시그마의 반대편으로 이륙하며, 다른 무언가를 쫓고 있다.</p>
                    <p class="mb-4">"그들이 뭘 박해하든," <span class="lore-term" data-lore="sami">사미</span>가 결론 내린다. "<span class="lore-term" data-lore="metalman">금속인간</span>에게 호의를 베푸는 착한 약탈자 두 명은 아니야."</p>
                    <p class="mb-4">하지만, <span class="lore-term" data-lore="metalman">금속인간</span>과 이야기하면서, <span class="lore-term" data-lore="sami">사미</span>는 그가 <span class="lore-term" data-lore="pinnacle">피너클</span> 밖, 경제가 선물과 호의로 돌아가지 않는 곳에서 왔다는 강한 느낌을 받는다. 그리고 나니 이것이 정말로 호의였는지 확신이 서지 않는다.</p>
                    <p class="mb-4">어쩌면 이것은 <em>일</em>일지도 모른다.</p>
                    <p class="mb-4">아, 뭐. 어쩔 수 없지! <span class="lore-term" data-lore="sami">사미</span>는 머리를 뒤로 젖히고, 손을 깍지 끼고, 스트레칭을 한다. "미인의 행운이지," 그들은 아무도 감탄해 줄 사람이 없는 곳에서 말한다. "날개는 어때?"</p>
                    <p class="mb-4">"뻣뻣하고, 망가졌고, 더 나은 날을 바라고 있어," 탄이 말한다. "하지만 난 그걸 타고 <span class="lore-term" data-lore="kavaron">카바론</span>까지, 모르드레인 고리를 뚫고 날아갈 거야."</p>
                    <p class="mb-4">"그럼 날개를 펴고 유령 식민지를 약탈하러 가자."</p>
                    <p class="mb-4"><span class="lore-term" data-lore="sami">사미</span>는 방열판을 다시 펼치기 시작한다. <span class="lore-term" data-lore="seriema">세리마</span>호가 엔진을 아래로 향한 우주 비행 형태에서 배를 아래로 향한 항공 비행 형태로 전환할 때는 항상 충격적이다. 하지만 그것은 좋은 충격이다. 마치 손으로 땅 짚고 옆으로 도는 것 같다.</p>
                    <p class="mb-4">유령 식민지를 약탈하라. 그리고 <span class="lore-term" data-lore="metalman">금속인간</span>이 <span class="lore-term" data-lore="sami">사미</span>의 운명을 바꿀 것이라고 생각하는 것이 무엇이든 찾아라.</p>
                    <p class="mb-4">그가 <span class="lore-term" data-lore="sami">사미</span>에게 찾아오라고 보낸 장치를 뭐라고 불렀더라? 부품? 도구?</p>
                    <p class="mb-4">아니다. 그는 <em>유물</em>이라고 말했다.</p>
                    <hr class="my-6">
                    <p class="mb-4">마침내, <span class="lore-term" data-lore="seriema">세리마</span>호는 날개를 펼치고, 옅은 공기를 잡아, 동쪽에서 식민지를 향해 활강할 만큼 충분히 느리고 낮아졌다.</p>
                    <p class="mb-4">"아무것도 없어," 탄이 ESM 블록을 확인하며 보고한다. 그것의 임무는 누군가 그들을 쳐다볼 때 알려주는 것이다. "레이더 없어. 비콘 없어. 자동 착륙 없어. 그가 말한 그대로야. 그들은 식민지를 지었지만 아무도 오지 않았어."</p>
                    <p class="mb-4">"탄," <span class="lore-term" data-lore="sami">사미</span>가 관측 제어 장치에 손을 뻗으며 시작한다. "빛 보여?"</p>
                    <p class="mb-4">탄은 후방 카메라의 일몰을 쏘아본다. "모르겠는데. 보이나? 정말 빛인가? 저게 일몰이긴 한가? 블랙홀이 동쪽에서 질 때 뭐라고 부르지?"</p>
                    <p class="mb-4">소테라는 <em>초신성이 될 예정이었다</em>. 자식들의 대기를 날려버리고 방사선으로 구워버릴 예정이었다. 에테르 폭식의 분출로 자신의 가족을 살해할 예정이었다. 그 임박한 재앙이 <span class="lore-term" data-lore="sami">사미</span>가 여기에 있는 이유다. <span class="lore-term" data-lore="kav">카브족</span>과 <span class="lore-term" data-lore="eumidian">유미디안</span>(그들의 종자선이 우연히 이 별을 발견했다)을 제외하고 <em>누구든</em> 여기에 있는 이유다. <span class="lore-term" data-lore="pinnacle">피너클</span>은 영원의 기둥을 세우고 소테라가 <em>죽을</em> 것이기 때문에 소테라를 항성 비행에 개방했다.</p>
                    <p class="mb-4">모두가 <span class="lore-term" data-lore="drix">드릭스</span>가 최종적인 말을 해주기를 기다렸다: 소테라가 <em>곧</em> 죽을 것이라는 발표. <span class="lore-term" data-lore="drix">드릭스</span>는 항상 죽어가는 별에 온다. 신비로운 마지막 검사를 위해 그들의 황혼 세계를 <span class="lore-term" data-lore="weftwalk">씨실처럼 거닐며</span>.</p>
                    <p class="mb-4">하지만 <span class="lore-term" data-lore="drix">드릭스</span>는 아무런 신호도 주지 않았다.</p>
                    <p class="mb-4">소테라는 일종의 종말 붐타운이 되었다. 여기서는 <span class="lore-term" data-lore="mallow">맬로우</span>를 벌 수 있었다—대피를 돕고, 목록 작성을 돕고, 파괴될 것을 탐험하면서. <span class="lore-term" data-lore="kavaron">카바론</span>과 시그마의 퇴적물처럼 목사이트가 풍부한 점토도 있었다.</p>
                    <p class="mb-4">하지만 그때 <span class="lore-term" data-lore="monoist">모노이스트</span>들이 도착했다. 그들은 나선의 세계, 하늘의 검은 으르렁거림, 아누키를 파고들었다. 소테라의 가장 가까운 자식.</p>
                    <p class="mb-4">그리고 어느 날, (<span class="lore-term" data-lore="sami">사미</span>가 추측하기로는) 그들이 이전에 구백구십구 번 사용했던 것과 같은 수단으로, 그들은 소테라에게 세카르를 주었다.</p>
                    <p class="mb-4">그들은 이 별에 대해 다른 운명을 예견했다. 그것은 그들의 사슬에서 천 번째 고리가 될 것이며, <em>추락하는 그분</em>에 대한 천년의 증거이자 다음 영원의 전령이 될 것이었다(완벽한 검은 피부와 흰색 <span class="lore-term" data-lore="monoist">모노이스트</span> 문신, 그리고 손가락을 걸 수 있는 강한 어깨뼈를 가진 구혼자가 한때 <span class="lore-term" data-lore="sami">사미</span>에게 설명했듯이).</p>
                    <p class="mb-4">그래서, 그들은 별을 죽였다.</p>
                    <p class="mb-4">이것이 <span class="lore-term" data-lore="seriema">세리마</span>호가 죽은 일몰—일몰이 아닌 것—에서 시그마의 손길로 하강하는 이유다.</p>
                    <p class="mb-4">소테라는 이제 초공허, 블랙홀 태양이다.</p>
                    <p class="mb-4">그렇게 <em>아주</em> 검지는 않다. 소테라가 초신성으로 만들려고 하던 모든 유입 가스는 섬뜩한 보라색 빛의 고리로 포획되어, 그것을 삼키는 것에 의해 흥분되어 빛나는 우주 토크를 형성했다. 그 칼라는 여전히 이 안쪽 세계들을 따뜻하게 할 만큼 밝다—<span class="lore-term" data-lore="kavaron">카바론</span>의 온실 작물에 양분을 공급하고, 아다지아의 거울에 반짝이고, 에벤도의 빙하에서 물방울을 녹일 만큼.</p>
                    <p class="mb-4">지금은, 세계들은 예전처럼 돈다. 하지만 <span class="lore-term" data-lore="monoist">모노이스트</span>들은 소테라를 먹여 살리며, 그들의 어둡고 우뚝 솟은 자식을 키우고 있다. 그 굶주림은 증가하고 있다.</p>
                    <p class="mb-4">그리고 때때로, <span class="lore-term" data-lore="sami">사미</span>가 그것을 볼 때, 그들은 바닥없는 우물을 본다. 그들과, 탄과, <span class="lore-term" data-lore="seriema">세리마</span>호와, 시그마의 손길과, <span class="lore-term" data-lore="mirri">미리</span>가 모두 떨어지고 있는 구멍을. 별 여행자들이 궤도라고 부르는 좋은 종류의 낙하가 아니라. 끝나는 종류의 낙하.</p>
                    <p class="mb-4"><span class="lore-term" data-lore="monoist">모노이스트</span>들은 언젠가 이 구멍이 그들의 다른 모든 신성한 공허와 같은 곳으로 이어질 것이라고 말한다. 그리고 그날, 그들은 추락하는 자, <em>추락하는 그분</em>이 마지막 어둠의 가장자리에서 그의 비밀을 전송하는 것을 엿볼 것이라고—</p>
                    <p class="mb-4">불빛. 그들은 불빛에 대해 무언가 말하고 있었다.</p>
                    <p class="mb-4">"탄! 앞을 봐!"</p>
                    <p class="mb-4">"알았어," 탄이 서두르지 않고 말한다. "빛이 보이나? 내가 보는 건—"</p>
                    <p class="mb-4">카브족이 놀랐을 때 긴장을 푸는 이유는 그들이 더 큰 짐승들(그리고 서로에게)에 의해 내던져지도록 진화했기 때문이다.</p>
                    <p class="mb-4">탄은 축 늘어지지 않는다. 하지만 그는 분명히 약간 처진다.</p>
                    <p class="mb-4">"불빛들," 그가 말한다. "식민지 전체가 불 켜져 있어."</p>
                    <p class="mb-4">창문의 불빛들. 활주로 옆의 불빛들.</p>
                    <p class="mb-4">프사이머로 쓰인 표지판의 불빛들: 시그마의 손길에 오신 것을 환영합니다—인구 13,879명 플러스 친구와 가족—"크게 파봅시다!"</p>
                    <div id="sigma-reach-chart" class="my-6"></div>
                    <p class="mb-4">"<span class="lore-term" data-lore="metalman">금속인간</span>은 여기 아무도 없다고 했어," 탄이 주장한다. "분명히 기억해."</p>
                    <p class="mb-4">"탄, 내 생각엔, 그리고 여기서 평정심을 잃지 않도록 노력해, <span class="lore-term" data-lore="metalman">금속인간</span>이 거짓말을 했을지도 몰라."</p>
                    <p class="mb-4">"하지만 비어 있어. 내려오는 길에 영상 찍었잖아." 탄은 안정적인 주의력 스택을 가진 존재가 항상 자신감을 갖는 방식으로 자신감이 있었다. 왜냐하면 단기 기억과 장기 기억 사이에 새는 틈이 없고, 그저 아주 긴 현재만 있기 때문이다.</p>
                    <p class="mb-4">"다시 해봐," <span class="lore-term" data-lore="sami">사미</span>가 말한다. "어쩌면 지난번엔 다들 실내에 있었을지도 모르지."</p>
                    <p class="mb-4">탄은 라이더, 밀리미터파 레이더, 함선의 나머지 관측 서커스 전체를 발사한다.</p>
                    <p class="mb-4">"뜨거워," 그가 보고한다. "나머지 테티스보다 더 뜨거워." 시그마의 손길은 오래전에 마른 해저의 대륙붕 위에 지어졌는데, <span class="lore-term" data-lore="pinnacle">피너클</span>은 이를 <em>테티스</em>라고 부른다. "약 2만 개의 몸체, 플러스 동력과 대기만큼 뜨거워. 가동 중인 핵분열 발전소가 있어."</p>
                    <p class="mb-4">"공기는?"</p>
                    <p class="mb-4">"이산화탄소 농도 상승. 약... 2만 명의 산소 호흡 거주자와 일치."</p>
                    <p class="mb-4">"주택은?"</p>
                    <p class="mb-4">"이미 알잖아."</p>
                    <p class="mb-4">"하지만 <em>사람들</em>이 있어?"</p>
                    <p class="mb-4">아니다. 살아있는 것은 하나도 없다.</p>
                    <p class="mb-4">돌아온 것은 말이 되지 않는다.</p>
                    <p class="mb-4">"이거 아주 안 좋은 예감이 들어," 탄이 말한다.</p>
                    <p class="mb-4">하지만 탄은 <span class="lore-term" data-lore="sami">사미</span>에게 착륙을 중단하라고 요청하지 않는다.</p>
                    <p class="mb-4">탄은 선택에 대한 특이한 공포증이 있다. 어쩌면 이것이 탄이 다른 모든 사람들이 더 나은 선택을 하고 떠날 때 <span class="lore-term" data-lore="sami">사미</span>와 함께 <span class="lore-term" data-lore="seriema">세리마</span>호에 머무는 이유일지도 모른다. <span class="lore-term" data-lore="sami">사미</span>는 탄이 그냥 자신들을 정말 좋아한다고 생각하는 것을 선호한다.</p>
                    <p class="mb-4">"여기 아무도 없어야 했어," <span class="lore-term" data-lore="sami">사미</span>가 중얼거린다. "그들은 점토를 채굴하기 위해 식민지를 지었지만, 태양이 폭발할 예정이었어. 그래서 아무도 오지 않았지."</p>
                    <p class="mb-4">그들은 전방 카메라를 응시한다. 그런 다음 후방 카메라를. 전방: 모든 불이 켜진 텅 빈 식민지. 후방: 빛의 고리가 있는 텅 빈 태양.</p>
                    <p class="mb-4">그들은 재빨리, 올바른 질문으로 뛰어든다:</p>
                    <p class="mb-4">"태양은 폭발하지 <em>않았어</em>. 그럼 왜 아무도 여기에 오지 않았지? 왜 일을 시작하지 않았지?"</p>
                    <p class="mb-4">탄이 배를 긁는다. "내 배를 땅에 대야겠어. 그런 다음에 여기 누가 있는지 말해줄게. 난 항상 <span class="lore-term" data-lore="human">인간</span> 발자국을 느낄 수 있거든."</p>
                    <p class="mb-4">"알았어." <span class="lore-term" data-lore="sami">사미</span>가 조종간을 잡고, 추진기를 안정된 수동으로 전환한다. "한번 둘러보자. 그리고 얼마나 훔칠 수 있을지 결정하자."</p>

            }

            dialogContentEl.innerHTML = `
                <div class="p-6 ${notation.style.includes('tezz') ? 'bg-stone-800 text-stone-200 font-mono' : 'bg-blue-900/95 text-white font-serif'}">
                    <p class="mb-6">${notation.content}</p>
                    <div class="text-center space-x-4">
                        ${buttonHtml}
                    </div>
                </div>
            `;
            dialogEl.showModal();
        }

        function renderSigmaReachChart() {
            const chartContainerDiv = document.getElementById('sigma-reach-chart');
            if (!chartContainerDiv) return;

            const container = document.createElement('div');
            container.className = 'chart-container bg-stone-50 p-4 rounded-lg shadow-inner';

            const canvas = document.createElement('canvas');
            canvas.id = 'sigmaChart';
            container.appendChild(canvas);
            chartContainerDiv.appendChild(container);

            const ctx = canvas.getContext('2d');

            if (currentChart) {
                currentChart.destroy();
            }

            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['표지판 인구', '열 신호(등가 인원)', '실제 생명체'],
                    datasets: [{
                        label: '시그마의 손길: 데이터 불일치',
                        data: [13879, 20000, 0],
                        backgroundColor: [
                            'rgba(59, 130, 246, 0.6)',
                            'rgba(239, 68, 68, 0.6)',
                            'rgba(132, 140, 153, 0.6)'
                        ],
                        borderColor: [
                            'rgba(59, 130, 246, 1)',
                            'rgba(239, 68, 68, 1)',
                            'rgba(132, 140, 153, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } },
                    plugins: {
                        legend: { display: false },
                        title: {
                            display: true,
                            text: '시그마의 손길: 데이터 불일치',
                            font: { size: 16, family: "'Noto Sans KR', sans-serif" },
                            color: '#1c1917'
                        },
                        tooltip: {
                            titleFont: { family: "'Noto Sans KR', sans-serif" },
                            bodyFont: { family: "'Noto Sans KR', sans-serif" }
                        }
                    }
                }
            });
        }

        function showLore(key) {
            const lore = loreData[key];
            if (!lore) return;

            loreTitleEl.textContent = lore.title;
            loreBodyEl.textContent = lore.content;
            lorePanelEl.classList.add('is-open');
            appContainer.style.filter = 'blur(4px)';
        }

        function hideLore() {
            lorePanelEl.classList.remove('is-open');
            appContainer.style.filter = 'none';
        }

        storyContentEl.addEventListener('click', (e) => {
            if (e.target.dataset.target) {
                renderSection(e.target.dataset.target);
                window.scrollTo(0, 0);
            } else if (e.target.dataset.lore) {
                showLore(e.target.dataset.lore);
            } else if (e.target.dataset.notationId) {
                showNotation(e.target.dataset.notationId);
            }
        });

        dialogEl.addEventListener('click', (e) => {
            if (e.target.dataset.dialogClose) {
                dialogEl.close();
            } else if (e.target.dataset.notationId) {
                showNotation(e.target.dataset.notationId);
            }
        });

        closeLoreBtn.addEventListener('click', hideLore);

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                if (lorePanelEl.classList.contains('is-open')) hideLore();
                if (dialogEl.open) dialogEl.close();
            }
        });

        renderSection('Revision0');
    </script>
</body>

</html>
